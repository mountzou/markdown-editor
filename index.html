<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#393E46" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />

    <!-- Primary Meta -->
    <title>Markdown Editor — Real-time preview, LaTeX &amp; syntax highlighting</title>
    <meta name="description" content="A client-side Markdown editor with real-time preview, syntax highlighting for code blocks, and LaTeX support for mathematical expressions. Built with React and TypeScript." />
    <meta name="author" content="Chris Mountzouris" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Markdown Editor — Real-time preview, LaTeX &amp; syntax highlighting" />
    <meta property="og:description" content="A client-side Markdown editor with real-time preview, syntax highlighting, and LaTeX support for math. Built with React and TypeScript." />

    <% if (baseUrl) { %><link rel="canonical" href="<%- baseUrl %>/" /><% } %>
    <meta property="og:image" content="<%= baseUrl ? baseUrl + '/android-chrome-512x512.png' : './android-chrome-512x512.png' %>" />
    <meta property="og:locale" content="en_US" />
    <% if (baseUrl) { %><meta property="og:url" content="<%- baseUrl %>/" /><% } %>

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Markdown Editor — Real-time preview, LaTeX &amp; syntax highlighting" />
    <meta name="twitter:description" content="A client-side Markdown editor with real-time preview, syntax highlighting, and LaTeX support. Built with React and TypeScript." />
    <meta name="twitter:image" content="<%= baseUrl ? baseUrl + '/android-chrome-512x512.png' : './android-chrome-512x512.png' %>" />

    <!-- PWA / Mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />

    <script>
      (function() {
        var stored = localStorage.getItem('markdown-editor-theme');
        if (stored === 'light' || stored === 'dark') {
          document.documentElement.setAttribute('data-theme', stored);
        }
      })();
    </script>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <% if (baseUrl) { %>
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"WebApplication","name":"Markdown Editor","description":"A client-side Markdown editor with real-time preview, syntax highlighting for code blocks, and LaTeX support for mathematical expressions. Built with React and TypeScript.","url":"<%- baseUrl %>/","applicationCategory":"DeveloperApplication","operatingSystem":"Any"}
    </script>
    <% } %>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
